<h2> Add Product</h2>
<form #productForm="ngForm"(ngSubmit)="onSubmit(productForm)">

    <mat-form-field appearance="outline" style="width:300px;">
        <mat-label>  productName</mat-label>

<input matInput  name="name"[(ngModel)]="productName" required>{{'PRODUCT_NAME' | translate}}<br><br>
</mat-form-field><br><br>
<button mat-raised-button color="primary" type="submit" [disabled]="productForm.invalid">{{'SUBMIT' | translate}}

</button>
</form>
